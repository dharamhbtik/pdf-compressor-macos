name: Build & Release macOS App

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

# IMPORTANT: These permissions are required for creating releases
permissions:
  contents: write
  actions: read
  
env:
  APP_NAME: PDFCompressor

jobs:
  build:
    name: Build & Sign
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.0'
        
    - name: Cache SPM
      uses: actions/cache@v4
      with:
        path: .build
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift') }}
        restore-keys: ${{ runner.os }}-spm-
        
    - name: Build Release Binary
      run: swift build -c release
      
    - name: Create App Bundle
      run: |
        BINARY=.build/release/${{ env.APP_NAME }}
        APP_DIR="${{ env.APP_NAME }}.app"
        
        # Create app bundle structure
        mkdir -p "$APP_DIR/Contents/MacOS"
        mkdir -p "$APP_DIR/Contents/Resources"
        
        # Copy binary
        cp "$BINARY" "$APP_DIR/Contents/MacOS/"
        
        # Create Info.plist with proper version
        VERSION="${{ github.ref_name }}"
        if [ -z "$VERSION" ]; then
          VERSION="v${{ github.event.inputs.version }}"
        fi
        # Remove 'v' prefix if present for CFBundleShortVersionString
        CLEAN_VERSION=$(echo "$VERSION" | sed 's/^v//')
        
        cat > "$APP_DIR/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>${{ env.APP_NAME }}</string>
            <key>CFBundleIdentifier</key>
            <string>com.pdfcompressor.macos</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>PDF Compressor</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>$CLEAN_VERSION</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSApplicationCategoryType</key>
            <string>public.app-category.utilities</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
        
        # Create PkgInfo
        echo "APPL????" > "$APP_DIR/Contents/PkgInfo"
        
        # Make executable with proper permissions
        chmod 755 "$APP_DIR/Contents/MacOS/${{ env.APP_NAME }}"
        
        # Ad-hoc code sign the binary (required for macOS to not show as corrupted)
        codesign --force --deep --sign - "$APP_DIR/Contents/MacOS/${{ env.APP_NAME }}"
        
        # Sign the entire app bundle
        codesign --force --deep --sign - "$APP_DIR"
        
        # Verify signing
        codesign -vv "$APP_DIR"
        
        # Create zip (preserving symlinks and permissions)
        zip -r "${{ env.APP_NAME }}.zip" "$APP_DIR" -y
        
        # Verify
        ls -la "${{ env.APP_NAME }}.zip"
        echo "--- App bundle structure ---"
        ls -laR "$APP_DIR"
        echo "--- Binary info ---"
        file "$APP_DIR/Contents/MacOS/${{ env.APP_NAME }}"
        codesign -dv "$APP_DIR" 2>&1 || true
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-macOS
        path: ${{ env.APP_NAME }}.zip
        retention-days: 90
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        name: PDF Compressor ${{ github.ref_name != '' && github.ref_name || format('v{0}', github.event.inputs.version) }}
        tag_name: ${{ github.ref_name != '' && github.ref_name || format('v{0}', github.event.inputs.version) }}
        files: ${{ env.APP_NAME }}.zip
        generate_release_notes: true
        body: |
          ## PDF Compressor for macOS ${{ github.ref_name != '' && github.ref_name || format('v{0}', github.event.inputs.version) }}
          
          ### 📥 Download
          Download `PDFCompressor.zip` from **Assets** section below.
          
          ---
          
          ### 🚀 Quick Start
          
          1. Download & unzip `PDFCompressor.zip`
          2. Drag `PDFCompressor.app` to **Applications** folder
          3. **⚠️ IMPORTANT - First Launch:**
             - **Right-click** the app → Click **"Open"**
             - Click **"Open"** again in the security dialog
          
          ---
          
          ### ⚠️ "Cannot Verify" / Security Warning?
          
          This is **normal** for unsigned open-source apps. Apple requires a $99/year certificate.
          
          **3 ways to open:**
          
          **Method 1 - Right-click (Easiest):**
          ```
          Right-click app → Open → Open
          ```
          
          **Method 2 - System Settings:**
          1. Open System Settings → Privacy & Security
          2. Scroll to Security section
          3. Find "PDFCompressor was blocked"
          4. Click "Open Anyway"
          
          **Method 3 - Terminal (100% works):**
          ```bash
          xattr -cr /Applications/PDFCompressor.app
          ```
          
          ---
          
          ### 💡 Features
          - ✅ Compress PDFs to **any size** (MBs to KBs)
          - ✅ 5 quality levels: Maximum → Extreme
          - ✅ Native macOS SwiftUI interface
          - ✅ Drag & drop support
          - ✅ Live PDF preview
          - ✅ **100% native** - no third-party libraries
          
          ### 📋 Usage
          1. Open the app
          2. Select PDF (drag & drop or browse)
          3. Choose mode:
             - **Target Size**: Exact file size (e.g., 500KB)
             - **Percentage**: Reduce by % (e.g., 80%)
             - **Quality**: Preset levels
          4. Click **Compress PDF**
          5. Save compressed file
          
          ### 🖥️ System Requirements
          - macOS 13.0+ (Ventura or later)
          - Apple Silicon or Intel Mac
          
          ---
          
          ### 🛠️ Build from Source
          ```bash
          git clone https://github.com/${{ github.repository }}.git
          cd pdf-compressor-macos
          swift build -c release
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
